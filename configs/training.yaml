# MemexRL Training Configuration
# Hyperparameters from Section 3.3 of the paper

training:
  # GRPO parameters
  group_size: 8               # G rollouts per prompt
  batch_size: 32              # Prompts per rollout step
  clip_ratio: 2.0             # Truncated importance sampling
  kl_penalty: 0.001           # λ_KL

  # Optimization
  learning_rate: 5.0e-6
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 0
  max_epochs: 1
  gradient_accumulation_steps: 1

  # Context budget
  context_window: 32768
  threshold: 8000

  # Reward weights
  alpha_context: 0.3
  alpha_redundancy: 0.3
  alpha_format: 0.3

# Local M3 MacBook overrides (smaller model, smaller batch)
local:
  training:
    group_size: 2
    batch_size: 4
  llm:
    model: "qwen2.5:1.5b"

# Cloud GPU overrides (full paper spec)
cloud:
  training:
    group_size: 8
    batch_size: 32
  llm:
    model: "Qwen/Qwen3-30B-A3B"
    backend: "vllm"
    base_url: "http://localhost:8000/v1"
