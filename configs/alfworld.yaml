# ALFWorld-specific configuration
# Extends default.yaml with ALFWorld environment settings

agent:
  max_steps: 50               # ALFWorld tasks are shorter
  context_window: 32768
  threshold: 8000
  summary_max_tokens: 300
  temperature: 0.7

llm:
  backend: "openai"
  model: "qwen2.5:3b"
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"

environment:
  type: "alfworld"
  max_obs_tokens: 500
  look_limit: 1
  hide_initial_obs: true
  hide_commands: true
